<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <!-- bootstrap css -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css"
        integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <title>Flashcards</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container main-container">
        <h1 class="title">Flash Cards</h1>

        <div class="progress-section">
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <span class="progress-text" id="progressText">5 of 20</span>
        </div>

        <div class="card-container" id="cardContainer">
            <div class="card-content">
                <p id="cardText">What is the difference between var, let, and const?</p>
            </div>
        </div>

        <div class="buttons-container">
            <button class="btn btn-secondary" id="prevBtn">
                < Previous</button>
                    <button class="btn btn-outline-primary" id="showAnswerBtn">Show Answer</button>
                    <button class="btn btn-secondary" id="nextBtn">Next ></button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
